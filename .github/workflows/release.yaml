name: Release

# Playground variant of the Release workflow: triggered by a tag push
# (created by the Tag workflow). Creates the GitHub release and dispatches
# `tag-emitted` to the automation repo.
#
# Required repository secret:
#   AUTOMATION_DISPATCH_TOKEN  PAT with `repo` scope on the automation repo

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: {}

env:
  AUTOMATION_REPO: "tomleb/frameworks-automation"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh --repo '${{ github.repository }}' release create '${{ github.ref_name }}' \
            --verify-tag --generate-notes

      - name: Notify automation repo (repository_dispatch)
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_DISPATCH_TOKEN }}
        run: |
          gh api "repos/${AUTOMATION_REPO}/dispatches" \
            -f event_type=tag-emitted \
            -f client_payload[repo]='${{ github.repository }}' \
            -f client_payload[tag]='${{ github.ref_name }}' \
            -f client_payload[sha]='${{ github.sha }}'
